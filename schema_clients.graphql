type Mutation {
  createEvent(input: CreateEventInput!): EventDetailResponse! @isAuthenticated
  updateEvent(input: UpdateEventInput!): EventDetailResponse! @isAuthenticated
  createEventType(input: CreateEventTypeInput!): EventTypeDetailResponse! @isAuthenticated
  updateEventType(input: UpdateEventTypeInput!): EventTypeDetailResponse! @isAuthenticated
  createRequest(input: CreateRequestInput!): RequestDetailResponse!
  createEventStatus(input: CreateEventStatusInput!): EventStatusDetailResponse! @isAuthenticated
  updateEventStatus(input: UpdateEventStatusInput!): EventStatusDetailResponse! @isAuthenticated
  createLocation(input: CreateLocationInput!): LocationDetailResponse! @isAuthenticated
  updateLocation(input: UpdateLocationInput!): LocationDetailResponse! @isAuthenticated
  createClient(input: CreateClientInput!): ClientDetailResponse! @isAuthenticated
  updateClient(input: UpdateClientInput!): ClientDetailResponse! @isAuthenticated
  createDistributor(input: CreateDistributorInput!): DistributorDetailResponse! @isAuthenticated
  updateDistributor(input: UpdateDistributorInput!): DistributorDetailResponse! @isAuthenticated
  createRetailer(input: CreateRetailerInput!): RetailerDetailResponse! @isAuthenticated
  updateRetailer(input: UpdateRetailerInput!): RetailerDetailResponse! @isAuthenticated
  createProductType(input: CreateProductTypeInput!): ProductTypeDetailResponse! @isAuthenticated
  updateProductType(input: UpdateProductTypeInput!): ProductTypeDetailResponse! @isAuthenticated
  createProduct(input: CreateProductInput!): ProductDetailResponse! @isAuthenticated
  updateProduct(input: UpdateProductInput!): ProductDetailResponse! @isAuthenticated
  createRequestType(input: CreateRequestTypeInput!): RequestTypeDetailResponse! @isAuthenticated
  updateRequestType(input: UpdateRequestTypeInput!): RequestTypeDetailResponse! @isAuthenticated
  createRequestStatus(input: CreateRequestStatusInput!): RequestStatusDetailResponse! @isAuthenticated
  updateRequestStatus(input: UpdateRequestStatusInput!): RequestStatusDetailResponse! @isAuthenticated
  approveRequest(id: ID!): ApproveRequestResponse! @isAuthenticated
  register(firstName: String!, email: String!, password1: String!, password2: String!, roleId: ID!, tenantId: ID!): RegisterResponse!
  socialAuthGoogle(accessToken: String!, roleId: ID!, tenantId: ID!): SocialAuthResponse!
  socialAuthApple(identityToken: String!, roleId: ID!, tenantId: ID!): SocialAuthResponse!

  "### Checks if a token is not expired and correct.\n\n*Note that this is not for refresh tokens.*\n"
  verifyToken(input: VerifyTokenInput!): VerifyTokenType!

  "Obtain JSON web token for given user.\n\nAllow to perform login with different fields, The fields are defined\non settings.\n\nNot verified users can log in by default. This can be changes on\nsettings.\n\nIf user is archived, make it unarchived and return\n`unarchiving=True` on OutputBase.\n"
  tokenAuth(input: ObtainJSONWebTokenInput!): ObtainJSONWebTokenType!

  "### refreshToken to generate a new login token:\n\n*Use this only if `JWT_LONG_RUNNING_REFRESH_TOKEN` is True*\n\nusing the refresh-token you already got during authorization, and\nobtain a brand-new token (and possibly a new refresh token if you\nrevoked the previous). This is an alternative to log in when your\ntoken expired.\n"
  refreshToken(input: RefreshTokenInput!): ObtainJSONWebTokenType!

  "Verify user account.\n\nReceive the token that was sent by email. If the token is valid,\nmake the user verified by making the `user.status.verified` field\ntrue.\n"
  verifyAccount(input: VerifyAccountInput!): MutationNormalOutput!
}

type MutationNormalOutput {
  success: Boolean!
  errors: ExpectedError
}

input ObtainJSONWebTokenInput {
  password: String!
  username: String!
}

"\n    encapsulates token data, and refresh token data if `JWT_LONG_RUNNING_REFRESH_TOKEN` is on.\n    with an output interface.\n    "
type ObtainJSONWebTokenType implements OutputInterface {
  success: Boolean!
  errors: ExpectedError
  user: UserType
  token: TokenType
  refreshToken: RefreshTokenType
}

interface OutputInterface {
  success: Boolean!
  errors: ExpectedError
}

