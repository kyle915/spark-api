"""
If `revoke_refresh_token` is true, revokes to refresh token an creates a new one.
"""
input RefreshTokenInput {
  refreshToken: String!

  """revokes the previous refresh token, and will generate new one."""
  revokeRefreshToken: Boolean! = false
}

"\nRefresh token can be used to obtain a new token instead of log in again\nwhen the token expires.\n\n*This is only used if `JWT_LONG_RUNNING_REFRESH_TOKEN` is set to True.*\n"
type RefreshTokenType {
  """randomly generated token that is attached to a FK user."""
  token: String!
  created: DateTime!
  revoked: DateTime
  expiresAt: DateTime!
  isExpired: Boolean!
}

