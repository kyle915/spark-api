name: Pre-shift checklists

# Fires `/internal/cron/pre-shift-checklists` on Cloud Run every ~10 min.
# Sends the per-shift "pre-shift checklist" push (~2h before start) to every
# BA with an approved shift starting within lead_minutes, once each, deduped
# via AmbassadorEvent.pre_shift_checklist_sent_at. See
# events/management/commands/send_pre_shift_checklists.py.
#
# Replaces the dead django-rq scheduled checklist (there is no Redis /
# rqscheduler in prod, so scheduler.enqueue_at(...) silently dropped it).
# The push is sent INLINE in the web process — no worker needed.
#
# First-run safety: only FUTURE shifts (start_time > now) within the lead
# window are selected, so a first run can't blast historical shifts whose
# column is still NULL, and an already-started shift never gets a checklist.
#
# Secret-gated via `X-Cron-Secret` (shared INTERNAL_CRON_SECRET on both the
# Cloud Run env and the repo secret).
#
# Schedule: every 10 minutes. The 120-min lead window is far wider than the
# cadence on purpose so no shift slips between two runs; the dedup stamp
# keeps each checklist to a single send (~2h before start).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report who would get a checklist, but send nothing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      lead_minutes:
        description: "Send checklist for shifts starting within N minutes"
        required: false
        default: "120"

jobs:
  fire-pre-shift-checklists:
    runs-on: ubuntu-latest
    steps:
      - name: Fire pre-shift-checklists cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/pre-shift-checklists
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          LEAD_MINUTES: ${{ github.event.inputs.lead_minutes || '120' }}
        run: |
          set -euo pipefail

          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL?dry_run=$DRY_RUN&lead_minutes=$LEAD_MINUTES" \
            -H "X-Cron-Secret: $CRON_SECRET")

          echo "HTTP $STATUS"
          cat /tmp/cron-response.json
          if [ "$STATUS" != "200" ]; then
            echo "::error::Cron endpoint returned $STATUS — see body above."
            exit 1
          fi
