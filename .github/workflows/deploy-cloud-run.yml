name: Deploy to Cloud Run

# Closes the dev loop: merging to develop redeploys spark-api-new on
# Cloud Run without anyone running `gcloud run deploy --source .` by
# hand. Same pattern the front-client uses for Firebase Hosting.
#
# The two existing workflows in this repo (gce-prod-deploy.yml +
# fly-deploy.yml) target older / parallel hosts (legacy GCE box +
# Fly.io). They're left untouched — this one drives the live Cloud
# Run service that production actually serves out of.

on:
  push:
    branches:
      - develop
  # Manual trigger so you can re-deploy whenever (e.g. after rotating
  # a secret or env var without changing code).
  workflow_dispatch:

# Project + service identifiers — both safe to live in git. The
# project ID is already visible in .firebaserc on the front-client
# side; Cloud Run service name is whatever the deploy targets.
env:
  GCP_PROJECT_ID: spark-479222
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: spark-api-new
  # Runtime service account the Cloud Run service runs as. Needs
  # roles/iam.serviceAccountTokenCreator on itself so utils/gcs.py
  # can call the IAM Credentials API's signBlob endpoint when it
  # generates v4 signed URLs (Cloud Run's workload-identity
  # credentials don't carry a private key — see the Ensure runtime
  # SA can self-sign step at the end of this workflow).
  CLOUD_RUN_RUNTIME_SA: spark-api-new-sa@spark-479222.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Concurrency: only one deploy at a time per branch. If a second
    # PR merges while the first is mid-deploy, cancel the in-flight
    # run and start fresh on the newer SHA. Cheaper than waiting and
    # avoids the "two builds racing for the same revision slot" race.
    concurrency:
      group: deploy-cloud-run-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Service-account JSON → ADC via the google-github-actions/auth
      # action. The secret needs Cloud Run Admin + Service Account User
      # + Storage Admin (for Cloud Build artifacts) on the project.
      # Setup steps for the service account are in the PR body — the
      # same secret can be reused for any other gcloud-CLI workflow.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # `gcloud run deploy --source .` does the full happy path:
      # zips the source, ships to Cloud Build, builds the Dockerfile,
      # pushes the resulting image to Artifact Registry, updates the
      # Cloud Run service while preserving all existing env vars,
      # secrets, Cloud SQL connections, and traffic settings.
      #
      # --quiet skips the "deploy to <env>?" interactive prompt.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --source . \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --quiet

      # Self-heal the IAM binding that GCS signed-URL generation
      # depends on. The runtime SA needs roles/iam.serviceAccount-
      # TokenCreator ON ITSELF — that's how a SA without a local
      # private key signs blobs via Google's IAM Credentials API.
      #
      # This binding was set up by hand once and then evaporated
      # during a subsequent SA reshuffle, breaking ALL recap photo
      # uploads in production until someone re-granted it through
      # the IAM UI. add-iam-policy-binding is naturally idempotent
      # (no-op if the binding already exists), so running it on
      # every deploy costs nothing and prevents the bug from
      # silently re-appearing.
      #
      # Requires the deploy SA (GCP_DEPLOY_SERVICE_ACCOUNT secret)
      # to hold roles/iam.serviceAccountAdmin on CLOUD_RUN_RUNTIME_SA
      # — or roles/resourcemanager.projectIamAdmin at the project
      # level. If this step fails with "Permission 'iam.service-
      # Accounts.setIamPolicy' denied" the deploy SA is missing
      # that meta-permission and needs it granted once via the
      # Console (Service Accounts → spark-api-new-sa → Permissions
      # → Grant Access → role: Service Account Admin → principal:
      # the deploy SA email).
      - name: Ensure runtime SA can self-sign (GCS signed URLs)
        # Non-fatal: if the deploy SA is missing the meta-permission
        # (iam.serviceAccountAdmin on CLOUD_RUN_RUNTIME_SA) this
        # step logs the error and moves on. The manually-applied
        # binding from the IAM Console stays in place, so uploads
        # keep working. Once the meta-permission is granted, future
        # deploys self-heal automatically.
        continue-on-error: true
        run: |
          gcloud iam service-accounts add-iam-policy-binding \
            "$CLOUD_RUN_RUNTIME_SA" \
            --member="serviceAccount:$CLOUD_RUN_RUNTIME_SA" \
            --role="roles/iam.serviceAccountTokenCreator" \
            --project="$GCP_PROJECT_ID" \
            --quiet

      # Smoke check after the deploy — assert the new revision is
      # ready and `serverInfo.databaseOk` is true. Catches the case
      # where the container starts but can't reach Postgres (e.g. a
      # bad secret or missing Cloud SQL connection annotation).
      - name: Verify deployment
        run: |
          REVISION=$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --region "$GCP_REGION" --project "$GCP_PROJECT_ID" \
            --format='value(status.latestReadyRevisionName)')
          echo "Live revision: $REVISION"
          RESPONSE=$(curl -s -X POST \
            "https://spark-api-new-490085168610.us-central1.run.app/api/v483927/graphql/spark" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ serverInfo { revision databaseOk } }"}')
          echo "$RESPONSE"
          if ! echo "$RESPONSE" | grep -q '"databaseOk": true'; then
            echo "::error::serverInfo.databaseOk is false — DB unreachable on the new revision."
            exit 1
          fi
