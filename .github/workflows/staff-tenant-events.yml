name: Staff tenant events (bulk BAs + jobs + bookings)

# Manually fires `/internal/cron/staff-tenant-events` on Cloud Run to bulk-
# staff a tenant's imported events from a committed spec ‚Äî see
# events/management/commands/staff_tenant_events.py. First use: Feel Free's
# Summer 2026 field samplings ($30/hr, 2 BAs per market).
#
# NOTE: applying with NEW BA emails in the spec SENDS each new BA the
# "Welcome to Spark by Ignite" email (credentials + app-store buttons).
#
# MANUAL one-off, NOT a recurring cron ‚Äî only `workflow_dispatch`.
# SAFE ‚Äî DRY-RUN IS THE DEFAULT (`dry_run: true` ‚Üí execute=false: reports
# matched events + which BAs would be created/emailed, writes nothing).
#
# Secret-gated via X-Cron-Secret (shared INTERNAL_CRON_SECRET), sent as a
# HEADER, never in the URL ‚Äî same setup as the sibling workflows.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes, no emails). Set false to apply."
        required: true
        default: true
        type: boolean
      spec:
        description: "Spec key (data/<key>.json)."
        required: true
        default: "feel_free_staffing"
        type: string
      owner_email:
        description: "Admin recorded as created_by on jobs/bookings."
        required: false
        default: ""
        type: string

jobs:
  fire-staff-tenant-events:
    runs-on: ubuntu-latest
    steps:
      - name: Fire staff-tenant-events cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/staff-tenant-events
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          SPEC: ${{ github.event.inputs.spec }}
          OWNER_EMAIL: ${{ github.event.inputs.owner_email || '' }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi

          if [ "$DRY_RUN" = "false" ]; then
            EXECUTE="true"
          else
            EXECUTE="false"
          fi
          echo "dry_run=$DRY_RUN -> execute=$EXECUTE"

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            --data-urlencode "execute=$EXECUTE" \
            --data-urlencode "spec=$SPEC" \
            --data-urlencode "owner_email=$OWNER_EMAIL")
          echo "HTTP $STATUS"
          cat /tmp/cron-response.json
          echo ""
          [ "$STATUS" != "200" ] && exit 1 || exit 0
