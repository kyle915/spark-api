name: Monthly scheduled client reports

# Fires `/internal/cron/send-scheduled-client-reports` on Cloud Run once a
# MONTH (1st of the month). Generates each opted-in tenant's monthly client
# performance-report PDF and emails it to that tenant's client contacts (see
# tenants/management/commands/send_scheduled_client_reports.py).
#
# Monthly is correct: with no args the command reports the prior COMPLETE
# calendar month, so a 1st-of-month run covers the month that just ended.
#
# SAFE — OPT-IN OFF by default. The command only emails tenants with
# scheduled_report_enabled=True AND recipients configured; that flag defaults
# to False, so until Ignite flips a client on this run emails NOBODY.
#
# Secret-gated via X-Cron-Secret (shared INTERNAL_CRON_SECRET) — same setup
# as the daily-document-expiry-reminders workflow.
#
# Schedule: 14:30 UTC on the 1st = 07:30 PT (DST) / 06:30 PST. 30-past avoids
# GHA's on-the-hour cron jitter (same offset convention as the daily crons).

on:
  schedule:
    # 14:30 UTC on the 1st of every month.
    - cron: "30 14 1 * *"
  workflow_dispatch:
    inputs:
      month:
        description: "Override reporting month as YYYY-MM (default: prior complete month)"
        required: false
        default: ""
      tenant:
        description: "Restrict to a single tenant id (optional)"
        required: false
        default: ""
      dry_run:
        description: "Generate + log recipients, but send no email"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  fire-scheduled-client-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Fire scheduled client reports cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/send-scheduled-client-reports
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          MONTH: ${{ github.event.inputs.month || '' }}
          TENANT: ${{ github.event.inputs.tenant || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi

          # Build the query string, only adding month/tenant when supplied so
          # an unattended run falls through to the command's defaults (prior
          # complete month, all opted-in tenants).
          QS="dry_run=$DRY_RUN"
          if [ -n "$MONTH" ]; then
            QS="$QS&month=$MONTH"
          fi
          if [ -n "$TENANT" ]; then
            QS="$QS&tenant=$TENANT"
          fi

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL?$QS" \
            -H "X-Cron-Secret: $CRON_SECRET")
          echo "HTTP $STATUS"
          cat /tmp/cron-response.json
          if [ "$STATUS" != "200" ]; then
            echo "::error::Cron endpoint returned $STATUS — see body above."
            exit 1
          fi
