name: Backfill recap retailers (manual)

# Manually fires `/internal/cron/backfill-recap-retailers` on Cloud Run to run
# the `backfill_recap_retailers` command. Sets CustomRecap.retailer on specific
# recaps whose Retailer was blank (so they grouped by city in the Girl Beer
# summary) or wrong, so "PERFORMANCE BY RETAILER" folds them into the right
# store. CustomRecap.retailer is per-recap + the highest-priority retailer
# source, so the shared Event is untouched. Idempotent.
# See recaps/management/commands/backfill_recap_retailers.py.
#
# Default targets (Girl Beer, from the [External] Girl Beer Retail Schedules):
#   Palm Desert → Whole Foods · Huntington Beach → Whole Foods ·
#   Long Beach → Whole Foods · Fullerton 6/5 → Albertsons (was mis-tagged Vons)
#
# SAFE — DRY-RUN IS THE DEFAULT. dry_run=true sends apply=false (no writes) and
# just REPORTS what it would set. Set dry_run=false to write. Run from the
# Actions tab AFTER the endpoint is deployed (ships from develop). Secret-gated
# via X-Cron-Secret (shared INTERNAL_CRON_SECRET) — a HEADER, never the URL.
# Manual one-off — no `schedule:`.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes). Leave true to preview; set false to apply."
        required: true
        default: true
        type: boolean
      tenant_slug:
        description: "Tenant slug."
        required: false
        default: "girl-beer"
        type: string

jobs:
  fire-backfill-recap-retailers:
    runs-on: ubuntu-latest
    steps:
      - name: Fire backfill-recap-retailers cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/backfill-recap-retailers
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          TENANT_SLUG: ${{ github.event.inputs.tenant_slug || 'girl-beer' }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi

          # dry_run=true -> apply=false (no writes); dry_run=false -> apply=true.
          if [ "$DRY_RUN" = "false" ]; then APPLY=true; else APPLY=false; fi

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL?apply=$APPLY&tenant_slug=$TENANT_SLUG" \
            -H "X-Cron-Secret: $CRON_SECRET")
          echo "HTTP $STATUS"
          cat /tmp/cron-response.json
          if [ "$STATUS" != "200" ]; then
            echo "::error::Cron endpoint returned $STATUS — see body above."
            exit 1
          fi
