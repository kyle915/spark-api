name: Deploy to GCE Staging (merged PR -> develop, UV + Auto Rollback + Logging)

on:
  pull_request:
    types:
      - closed
    branches:
      - staging

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------
      # LOCAL CI USING UV
      # ------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Sync dependencies (uv)
        run: uv sync
      # ------------------------------------
      # SSH CONFIGURATION
      # ------------------------------------
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCE_SSH_PRIVATE_KEY_STG }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.GCE_HOST_STG }} >> ~/.ssh/known_hosts
      
      # ------------------------------------
      # DEPLOY + BACKUP + AUTO ROLLBACK
      # ------------------------------------
      - name: Deploy to GCE (with Auto Rollback + Logging)
        run: |
          ssh ${{ secrets.GCE_USER_STG }}@${{ secrets.GCE_HOST_STG }} << 'EOF'

            APP_DIR="/home/spark/spark-api"
            BACKUP_DIR="/home/spark/deploy_backups"
            LOG_DIR="/home/spark/deploy_logs"

            mkdir -p $BACKUP_DIR
            mkdir -p $LOG_DIR

            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="$BACKUP_DIR/spark-api-backup-$TIMESTAMP.zip"
            LOG_FILE="$LOG_DIR/deploy-$TIMESTAMP.log"

            echo ">>> Starting deploy at $(date)" | tee -a $LOG_FILE
            echo ">>> Log file: $LOG_FILE" | tee -a $LOG_FILE

            echo ">>> Creating backup..." | tee -a $LOG_FILE
            cd /home/spark
            zip -r "$BACKUP_FILE" spark-api \
              -x "spark-api/*.sock" \
              -x "spark-api/*.pid" \
              -x "spark-api/run/*" \
              -x "spark-api/tmp/*" \
              -x "spark-api/__pycache__/*" \
              -x "spark-api/**/*.pyc" \
            > /dev/null
            echo ">>> Backup created: $BACKUP_FILE" | tee -a $LOG_FILE

            cd $APP_DIR

            echo ">>> Ensuring UV is installed..." | tee -a $LOG_FILE
            if ! command -v uv &> /dev/null; then
              echo ">>> UV not found, installing..." | tee -a $LOG_FILE
              curl -LsSf https://astral.sh/uv/install.sh | sh 2>&1 | tee -a $LOG_FILE
            fi

            echo ">>> Fetching latest code..." | tee -a $LOG_FILE
            git fetch origin 2>&1 | tee -a $LOG_FILE
            git reset --hard origin/staging 2>&1 | tee -a $LOG_FILE

            echo ">>> Syncing dependencies..." | tee -a $LOG_FILE
            uv sync 2>&1 | tee -a $LOG_FILE

            echo ">>> Running migrations..." | tee -a $LOG_FILE
            uv run python manage.py migrate 2>&1 | tee -a $LOG_FILE

            echo ">>> Restarting spark service..." | tee -a $LOG_FILE
            sudo systemctl restart spark 2>&1 | tee -a $LOG_FILE

            echo ">>> Waiting for health check..." | tee -a $LOG_FILE
            sleep 30

            HEALTH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST http://localhost/api/v1/graphql/spark \
            -H "Host: spark-api-stg.igniteproductions.co" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { healthcheck }"}')

            STATUS=$(echo "$HEALTH_RESPONSE" | tail -n 1)
            BODY=$(echo "$HEALTH_RESPONSE" | sed '$d')

            echo ">>> Healthcheck status: $STATUS" | tee -a $LOG_FILE
            echo ">>> Response body: $BODY" | tee -a $LOG_FILE

            if [ "$STATUS" = "200" ] && echo "$BODY" | grep -q '"healthcheck"[[:space:]]*:[[:space:]]*"ok"'; then
                echo ">>> Health check OK (GraphQL responded successfully)." | tee -a $LOG_FILE
                exit 0
            fi

            # -----------------------------
            # AUTO ROLLBACK ON FAILURE
            # -----------------------------
            set -e
            echo ">>> Health check FAILED ($STATUS). Starting rollback..." | tee -a $LOG_FILE

            echo ">>> Restoring backup..." | tee -a $LOG_FILE
            rm -rf $APP_DIR 2>&1 | tee -a $LOG_FILE
            unzip "$BACKUP_FILE" -d /home/spark/ 2>&1 | tee -a $LOG_FILE

            echo ">>> Resyncing dependencies after rollback..." | tee -a $LOG_FILE
            cd $APP_DIR
            uv sync 2>&1 | tee -a $LOG_FILE

            echo ">>> Restarting spark service (rollback)..." | tee -a $LOG_FILE
            sudo systemctl restart spark 2>&1 | tee -a $LOG_FILE

            echo ">>> Rollback complete." | tee -a $LOG_FILE
            exit 1

          EOF
          true