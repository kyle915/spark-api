name: Deploy to GCE (merged PR -> develop, UV + Auto Rollback + Logging)

on:
  pull_request:
    types:
      - closed
    branches:
      - develop

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------
      # LOCAL CI USING UV
      # ------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Sync dependencies (uv)
        run: uv sync

      - name: Run tests (uv)
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL  }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DEBUG: "True"
        run: uv run python manage.py test

      # ------------------------------------
      # SSH CONFIGURATION
      # ------------------------------------
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.GCE_HOST }} >> ~/.ssh/known_hosts

      # ------------------------------------
      # DEPLOY + BACKUP + AUTO ROLLBACK
      # ------------------------------------
      - name: Deploy to GCE (with Auto Rollback + Logging)
        run: |
          ssh ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }} << 'EOF'

            set -e

            APP_DIR="/home/wern/spark-api"
            BACKUP_DIR="/home/wern/deploy_backups"
            LOG_DIR="/home/wern/deploy_logs"

            mkdir -p $BACKUP_DIR
            mkdir -p $LOG_DIR

            TIMESTAMP=\$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="$BACKUP_DIR/spark-api-backup-\$TIMESTAMP.zip"
            LOG_FILE="$LOG_DIR/deploy-\$TIMESTAMP.log"

            echo ">>> Starting deploy at \$(date)" | tee -a \$LOG_FILE
            echo ">>> Log file: \$LOG_FILE" | tee -a \$LOG_FILE

            echo ">>> Creating backup..." | tee -a \$LOG_FILE
            cd /home/wern
            zip -r "\$BACKUP_FILE" spark-api > /dev/null
            echo ">>> Backup created: \$BACKUP_FILE" | tee -a \$LOG_FILE

            cd \$APP_DIR

            echo ">>> Ensuring UV is installed..." | tee -a \$LOG_FILE
            if ! command -v uv &> /dev/null; then
              echo ">>> UV not found, installing..." | tee -a \$LOG_FILE
              curl -LsSf https://astral.sh/uv/install.sh | sh 2>&1 | tee -a \$LOG_FILE
            fi

            echo ">>> Fetching latest code..." | tee -a \$LOG_FILE
            git fetch origin 2>&1 | tee -a \$LOG_FILE
            git reset --hard origin/develop 2>&1 | tee -a \$LOG_FILE

            echo ">>> Syncing dependencies..." | tee -a \$LOG_FILE
            uv sync 2>&1 | tee -a \$LOG_FILE

            echo ">>> Running migrations..." | tee -a \$LOG_FILE
            uv run python manage.py migrate 2>&1 | tee -a \$LOG_FILE

            echo ">>> Restarting spark service..." | tee -a \$LOG_FILE
            sudo systemctl restart spark 2>&1 | tee -a \$LOG_FILE

            echo ">>> Waiting for health check..." | tee -a \$LOG_FILE
            sleep 5

            STATUS=\$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health/)

            if [ "\$STATUS" = "200" ]; then
              echo ">>> Health check OK (200). Deploy successful." | tee -a \$LOG_FILE
              exit 0
            fi

            # -----------------------------
            # AUTO ROLLBACK ON FAILURE
            # -----------------------------
            echo ">>> Health check FAILED (\$STATUS). Starting rollback..." | tee -a \$LOG_FILE

            echo ">>> Restoring backup..." | tee -a \$LOG_FILE
            rm -rf \$APP_DIR 2>&1 | tee -a \$LOG_FILE
            unzip "\$BACKUP_FILE" -d /home/wern/ 2>&1 | tee -a \$LOG_FILE

            echo ">>> Resyncing dependencies after rollback..." | tee -a \$LOG_FILE
            cd \$APP_DIR
            uv sync 2>&1 | tee -a \$LOG_FILE

            echo ">>> Restarting spark service (rollback)..." | tee -a \$LOG_FILE
            sudo systemctl restart spark 2>&1 | tee -a \$LOG_FILE

            echo ">>> Rollback complete." | tee -a \$LOG_FILE
            exit 1

          EOF