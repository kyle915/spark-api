name: Set tenant mileage tracking (bulk)

# Manually fires `/internal/cron/set-tenant-mileage-tracking` on Cloud Run to
# bulk-toggle GPS mileage tracking (Event.track_mileage + $/mile rate) on a
# tenant's events â€” see events/management/commands/set_tenant_mileage_tracking.py.
# First use: Feel Free's 249 imported field samplings at the $0.725 default.
#
# MANUAL one-off, NOT a recurring cron â€” only `workflow_dispatch`.
#
# SAFE â€” DRY-RUN IS THE DEFAULT. `dry_run` defaults to true â†’ sends
# `execute=false`, so it only reports how many events match. Re-run with
# dry_run=false to write.
#
# Secret-gated via X-Cron-Secret (shared INTERNAL_CRON_SECRET), sent as a
# HEADER, never in the URL â€” same setup as the sibling workflows.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes). Leave true to preview; set false to apply."
        required: true
        default: true
        type: boolean
      tenant_name:
        description: "Tenant name (case-insensitive), e.g. Feel Free."
        required: true
        default: "Feel Free"
        type: string
      event_type:
        description: "Only events of this EventType name (empty = all the tenant's events)."
        required: false
        default: ""
        type: string
      since_date:
        description: "Only events dated YYYY-MM-DD or later (empty = all dates)."
        required: false
        default: ""
        type: string
      rate:
        description: "$/mile rate (3 decimals). 'none' = track miles only."
        required: false
        default: "0.725"
        type: string
      disable:
        description: "Disable tracking on the matched events instead."
        required: false
        default: false
        type: boolean

jobs:
  fire-set-tenant-mileage-tracking:
    runs-on: ubuntu-latest
    steps:
      - name: Fire set-tenant-mileage-tracking cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/set-tenant-mileage-tracking
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          TENANT_NAME: ${{ github.event.inputs.tenant_name }}
          EVENT_TYPE: ${{ github.event.inputs.event_type || '' }}
          SINCE_DATE: ${{ github.event.inputs.since_date || '' }}
          RATE: ${{ github.event.inputs.rate || '' }}
          DISABLE: ${{ github.event.inputs.disable }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi

          if [ "$DRY_RUN" = "false" ]; then
            EXECUTE="true"
          else
            EXECUTE="false"
          fi
          echo "dry_run=$DRY_RUN -> execute=$EXECUTE"

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            --data-urlencode "execute=$EXECUTE" \
            --data-urlencode "tenant_name=$TENANT_NAME" \
            --data-urlencode "event_type=$EVENT_TYPE" \
            --data-urlencode "since_date=$SINCE_DATE" \
            --data-urlencode "rate=$RATE" \
            --data-urlencode "disable=$DISABLE")
          echo "HTTP $STATUS"
          cat /tmp/cron-response.json
          echo ""
          [ "$STATUS" != "200" ] && exit 1 || exit 0
