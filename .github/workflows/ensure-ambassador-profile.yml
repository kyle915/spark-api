name: Ensure ambassador profile (existing user → test BA)

# Gives an EXISTING user a BA (Ambassador) profile so the mobile BA flows
# resolve for them — without touching their password, role, or flags
# (unlike the review-BA seeder). Lets a staff/admin use their own account
# as a test BA while keeping admin access. Dispatch-only.
#
# Set `remove` = true to REMOVE that user's BA profile instead (hard-delete,
# or soft-disable if it's FK-protected by bookings). Still never touches the
# user's password/role/flags. Used to clear a stray/duplicate test profile.

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Email of the existing user to give (or remove) a BA profile."
        required: true
        default: "kyle@igniteproductions.co"
        type: string
      remove:
        description: "Remove the BA profile instead of creating it."
        required: false
        default: false
        type: boolean

jobs:
  fire-ensure-ambassador-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Fire ensure-ambassador-profile cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/ensure-ambassador-profile
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          EMAIL: ${{ github.event.inputs.email }}
          REMOVE: ${{ github.event.inputs.remove }}
        run: |
          set -uo pipefail
          if [ -z "$CRON_SECRET" ]; then echo "::error::secret missing"; exit 1; fi
          if [ -z "$EMAIL" ]; then echo "::error::email required"; exit 1; fi
          ENC_EMAIL=$(echo "$EMAIL" | sed 's/+/%2B/g')
          QS="email=$ENC_EMAIL"
          if [ "$REMOVE" = "true" ]; then QS="$QS&remove=true"; fi
          echo "remove=$REMOVE -> $QS"

          # Idempotent (get_or_create / delete-if-present), so retry transient
          # gateway / cold-start responses (502/503/504/000) — a warm second
          # attempt returns 200, instead of emailing "failed" on a cold start.
          STATUS=000
          for attempt in 1 2 3; do
            STATUS=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
              -X POST "$CRON_URL?$QS" \
              -H "X-Cron-Secret: $CRON_SECRET" || echo 000)
            echo "attempt $attempt -> HTTP $STATUS"
            case "$STATUS" in
              502|503|504|000) echo "transient — retrying in $((attempt*10))s"; sleep $((attempt*10));;
              *) break;;
            esac
          done
          echo "----- response body -----"; cat /tmp/resp.json 2>/dev/null; echo; echo "-------------------------"
          case "$STATUS" in
            2*) echo "OK ($STATUS)"; exit 0;;
            4*) echo "::warning::Endpoint returned $STATUS (expected/input condition — e.g. user not found). See body above; this is NOT a run failure."; exit 0;;
            *) echo "::error::Endpoint returned $STATUS after retries — see body above."; exit 1;;
          esac
