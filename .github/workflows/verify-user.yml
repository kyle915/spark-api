name: Verify user account (unblock sign-in)

# Manually fires `/internal/cron/verify-user` on Cloud Run to mark a user
# verified + active (gqlauth UserStatus.verified=True, is_active=True) so they
# can sign in â€” see tenants/management/commands/verify_user.py. Unblocks a
# client/RMM user stuck at "Please verify your account" when the create-client
# flow left them unverified. Does NOT change role/password.
#
# MANUAL one-off, NOT a recurring cron â€” only workflow_dispatch.
#
# SAFE â€” DRY-RUN IS THE DEFAULT. dry_run=true â†’ execute=false â†’ reports the
# user's current state with NO change. Set dry_run=false to apply. Idempotent.
#
# Secret-gated via X-Cron-Secret (shared INTERNAL_CRON_SECRET), HEADER only.

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Email of the account to verify."
        required: true
        type: string
      dry_run:
        description: "Dry run (no change). Leave true to preview; set false to apply."
        required: true
        default: true
        type: boolean

jobs:
  fire-verify-user:
    runs-on: ubuntu-latest
    steps:
      - name: Fire verify-user cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/verify-user
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          EMAIL: ${{ github.event.inputs.email }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi
          if [ -z "$EMAIL" ]; then
            echo "::error::email input is required."
            exit 1
          fi

          if [ "$DRY_RUN" = "false" ]; then
            EXECUTE="true"
          else
            EXECUTE="false"
          fi
          echo "dry_run=$DRY_RUN -> execute=$EXECUTE (writes only when execute=true)"

          # Email travels in the query string; @ and + are URL-safe enough but
          # encode + just in case (plus-addressing).
          ENC_EMAIL=$(echo "$EMAIL" | sed 's/+/%2B/g')

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL?execute=$EXECUTE&email=$ENC_EMAIL" \
            -H "X-Cron-Secret: $CRON_SECRET")
          echo "HTTP $STATUS"

          echo "----- response body (verify report) -----"
          cat /tmp/cron-response.json
          echo
          echo "------------------------------------------"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Cron endpoint returned $STATUS â€” see body above."
            exit 1
          fi
