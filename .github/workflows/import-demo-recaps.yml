name: Import demo recaps (bulk recap back-load)

# Manually fires `/internal/cron/import-demo-recaps` on Cloud Run to bulk-create
# custom recaps (+ standalone approved events) for a tenant from a committed
# JSON data file â€” see recaps/management/commands/import_demo_recaps.py. First
# use: Girl Beer's internal (non-client-billable) make-good demos at seven
# H-E-B locations on 2026-07-04.
#
# MANUAL one-off, NOT a recurring cron â€” only `workflow_dispatch`. Run it from
# the Actions tab.
#
# SAFE â€” DRY-RUN IS THE DEFAULT. `dry_run` defaults to true â†’ sends apply=false,
# so the loader resolves the tenant/template, prints the exact columnâ†’field
# mapping, and previews every row with NO writes. To actually create the recaps,
# re-run with dry_run=false (â†’ apply=true). The loader is idempotent (skips any
# row whose event already exists), so a second real run won't double-create.
#
# Secret-gated via X-Cron-Secret (shared INTERNAL_CRON_SECRET), sent as a
# HEADER, never in the URL â€” same setup as the sibling data-op workflows.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes). Leave true to preview the mapping; set false to create."
        required: true
        default: true
        type: boolean
      dataset:
        description: "Dataset key (recaps/management/commands/data/<key>.json)."
        required: true
        default: "girlbeer_heb_makegood_2026_07_04"
        type: string

jobs:
  fire-import-demo-recaps:
    runs-on: ubuntu-latest
    steps:
      - name: Fire import-demo-recaps cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/import-demo-recaps
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          DATASET: ${{ github.event.inputs.dataset }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi

          # apply is the inverse of dry_run: dry_run=true -> apply=false
          # (preview, no writes); dry_run=false -> apply=true (create).
          if [ "$DRY_RUN" = "false" ]; then
            APPLY="true"
          else
            APPLY="false"
          fi
          echo "dry_run=$DRY_RUN -> apply=$APPLY (recaps created only when apply=true)"

          QS="apply=$APPLY&dataset=$DATASET"

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL?$QS" \
            -H "X-Cron-Secret: $CRON_SECRET")
          echo "HTTP $STATUS"

          echo "----- response body (import report) -----"
          cat /tmp/cron-response.json
          echo
          echo "-----------------------------------------"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Cron endpoint returned $STATUS â€” see body above."
            exit 1
          fi
