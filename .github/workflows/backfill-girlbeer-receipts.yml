name: Backfill Girl Beer receipts (manual)

# Manually fires `/internal/cron/backfill-girlbeer-receipts` on Cloud Run to run
# the `backfill_girlbeer_receipts` command. Girl Beer was onboarded WITHOUT its
# own FileRecapCategory rows, so receipt uploads (positional sentinel "2") fell
# through to a foreign/global PK-2 "Table setup" — a cross-tenant leak (the #765
# bug ran deeper than a keyword match could fix). This command does the real fix
# in two safe steps:
#   1. SEED Girl Beer's own default categories ("Sampling photos", "Table setup",
#      "Receipts") so NEW uploads resolve correctly.
#   2. BACKFILL the existing mis-filed receipts — Girl Beer recap files (scoped by
#      the file's RECAP tenant, to catch the foreign-category leak) currently in a
#      `source`-named category are moved to the tenant's `target` ("Receipts").
# See recaps/management/commands/backfill_girlbeer_receipts.py.
#
# RECATEGORIZE + SEED only: it never deletes a file or moves a blob. Idempotent.
#
# SAFE — DRY-RUN IS THE DEFAULT. dry_run=true sends execute=false (no writes) and
# just REPORTS what it would seed + move. Set dry_run=false to apply (seed
# categories + move the mis-filed receipts).
#
# Run it from the Actions tab AFTER the endpoint is deployed (it ships from
# develop). Secret-gated via X-Cron-Secret (shared INTERNAL_CRON_SECRET) — the
# secret is a HEADER, never in the URL. Manual one-off — no `schedule:`.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes). Leave true to preview; set false to seed + re-file."
        required: true
        default: true
        type: boolean
      tenant_slug:
        description: "Tenant slug."
        required: false
        default: "girl-beer"
        type: string
      source:
        description: "Source category name to drain."
        required: false
        default: "Table setup"
        type: string
      target:
        description: "Target category name to move into."
        required: false
        default: "Receipts"
        type: string

jobs:
  fire-backfill-girlbeer-receipts:
    runs-on: ubuntu-latest
    steps:
      - name: Fire backfill-girlbeer-receipts cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/backfill-girlbeer-receipts
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          TENANT_SLUG: ${{ github.event.inputs.tenant_slug || 'girl-beer' }}
          SOURCE: ${{ github.event.inputs.source || 'Table setup' }}
          TARGET: ${{ github.event.inputs.target || 'Receipts' }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi

          # dry_run=true -> execute=false (no writes); dry_run=false -> execute=true.
          if [ "$DRY_RUN" = "false" ]; then EXECUTE=true; else EXECUTE=false; fi

          QS="execute=$EXECUTE&tenant_slug=$TENANT_SLUG"
          if [ -n "$SOURCE" ]; then
            QS="$QS&source=$(printf '%s' "$SOURCE" | sed 's/ /%20/g')"
          fi
          if [ -n "$TARGET" ]; then
            QS="$QS&target=$(printf '%s' "$TARGET" | sed 's/ /%20/g')"
          fi

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL?$QS" \
            -H "X-Cron-Secret: $CRON_SECRET")
          echo "HTTP $STATUS"
          cat /tmp/cron-response.json
          if [ "$STATUS" != "200" ]; then
            echo "::error::Cron endpoint returned $STATUS — see body above."
            exit 1
          fi
