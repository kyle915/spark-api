name: Backfill Girl Beer receipts (manual)

# Manually fires `/internal/cron/backfill-girlbeer-receipts` on Cloud Run to run
# the `backfill_girlbeer_receipts` command — re-files recap receipts that were
# mis-categorized into "Table setup" into the tenant's receipt category (the
# Girl Beer bug fixed for NEW uploads in #765). See
# recaps/management/commands/backfill_girlbeer_receipts.py.
#
# RECATEGORIZE-ONLY: it never deletes a file or moves a blob.
#
# SAFE — DRY-RUN IS THE DEFAULT, and it's REPORT-ONLY unless you pick a
# selection. dry_run=true sends execute=false (no writes). With no `match` and
# move_all=false it just REPORTS the source-category files (and a
# looks-like-receipt hint) so you can choose. To actually move, set
# dry_run=false AND give a selection (match="receipt" or move_all=true).
#
# Run it from the Actions tab AFTER the endpoint is deployed (it ships from
# develop). Secret-gated via X-Cron-Secret (shared INTERNAL_CRON_SECRET) — the
# secret is a HEADER, never in the URL. Manual one-off — no `schedule:`.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes). Leave true to preview; set false to apply."
        required: true
        default: true
        type: boolean
      match:
        description: "Move only files whose name/url contains this (e.g. receipt). Empty = report only (unless move_all)."
        required: false
        default: ""
        type: string
      move_all:
        description: "Move ALL files in the source category (use only if the dry-run shows none are legit table-setup photos)."
        required: false
        default: false
        type: boolean
      tenant_slug:
        description: "Tenant slug."
        required: false
        default: "girl-beer"
        type: string
      source:
        description: "Source category name to drain."
        required: false
        default: "Table setup"
        type: string

jobs:
  fire-backfill-girlbeer-receipts:
    runs-on: ubuntu-latest
    steps:
      - name: Fire backfill-girlbeer-receipts cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/backfill-girlbeer-receipts
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          MATCH: ${{ github.event.inputs.match || '' }}
          MOVE_ALL: ${{ github.event.inputs.move_all }}
          TENANT_SLUG: ${{ github.event.inputs.tenant_slug || 'girl-beer' }}
          SOURCE: ${{ github.event.inputs.source || 'Table setup' }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi

          # dry_run=true -> execute=false (no writes); dry_run=false -> execute=true.
          if [ "$DRY_RUN" = "false" ]; then EXECUTE=true; else EXECUTE=false; fi

          QS="execute=$EXECUTE&move_all=$MOVE_ALL&tenant_slug=$TENANT_SLUG"
          if [ -n "$MATCH" ]; then
            # URL-encode spaces minimally (the values we pass are simple tokens).
            QS="$QS&match=$MATCH"
          fi
          if [ -n "$SOURCE" ]; then
            QS="$QS&source=$(printf '%s' "$SOURCE" | sed 's/ /%20/g')"
          fi

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL?$QS" \
            -H "X-Cron-Secret: $CRON_SECRET")
          echo "HTTP $STATUS"
          cat /tmp/cron-response.json
          if [ "$STATUS" != "200" ]; then
            echo "::error::Cron endpoint returned $STATUS — see body above."
            exit 1
          fi
