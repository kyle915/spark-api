name: Backfill Ambassador.coordinates (keyless Photon)

# Manually fires `/internal/cron/backfill-ambassador-coordinates` on Cloud Run
# to run the `backfill_ambassador_coordinates` command — geocodes
# `Ambassador.address` via the keyless Photon API to populate
# `Ambassador.coordinates` for BAs with empty coordinates and an address, so
# the "new gig nearby" distance push can measure how far each BA is. See
# ambassadors/management/commands/backfill_ambassador_coordinates.py.
#
# IMPORTANT: run this AFTER the code is deployed — it repairs the existing
# backlog. The endpoint must exist in the running service.
#
# This is a MANUAL one-off, NOT a recurring cron — so there is deliberately no
# `schedule:` trigger, only `workflow_dispatch`. Run it from the Actions tab.
#
# SAFE — DRY-RUN IS THE DEFAULT. The `dry_run` input defaults to true, which
# sends `execute=false`, so the backfill runs in DRY-RUN with NO DB writes and
# NO real geocoding sleeps, and the endpoint returns the report. To actually
# write (and geocode for real), re-run with dry_run=false (→ execute=true).
# The endpoint NEVER writes unless execute=true is passed.
#
# Secret-gated via X-Cron-Secret (shared INTERNAL_CRON_SECRET) — same setup as
# the repair-event-dates workflow. The secret is sent as a HEADER, never in
# the URL.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes, no geocoding). Leave true to preview; set false to apply."
        required: true
        default: true
        type: boolean
      auto_drain:
        description: "When applying (dry_run=false), keep firing until the backlog is fully drained (remaining=0). Each pass geocodes up to 40, so one run clears everything. Ignored on dry-run."
        required: false
        default: true
        type: boolean
      tenant:
        description: "Restrict to BAs linked to a single tenant (slug or numeric id). Empty = all BAs."
        required: false
        default: ""
        type: string

jobs:
  fire-backfill-ambassador-coordinates:
    runs-on: ubuntu-latest
    steps:
      - name: Fire backfill-ambassador-coordinates cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/backfill-ambassador-coordinates
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          AUTO_DRAIN: ${{ github.event.inputs.auto_drain }}
          TENANT: ${{ github.event.inputs.tenant || '' }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi

          # execute is the inverse of dry_run: dry_run=true -> execute=false
          # (preview, no writes); dry_run=false -> execute=true (apply).
          if [ "$DRY_RUN" = "false" ]; then
            EXECUTE="true"
          else
            EXECUTE="false"
          fi
          echo "dry_run=$DRY_RUN -> execute=$EXECUTE | auto_drain=${AUTO_DRAIN:-true} (writes only when execute=true)"

          # Only add tenant when supplied so an unscoped run falls through to
          # the command's default (all ambassadors).
          QS="execute=$EXECUTE"
          if [ -n "$TENANT" ]; then
            QS="$QS&tenant=$TENANT"
          fi

          # Each pass geocodes at most the command's --limit (default 40) so a
          # single HTTP request stays well under the Cloud Run 300s ceiling. On
          # execute with auto_drain we loop the endpoint until the backlog is
          # gone (remaining=0) or a pass makes no forward progress (an
          # un-geocodable tail), so one run drains everything without timing out.
          MAX_PASSES=400
          PASS=0
          while :; do
            PASS=$((PASS + 1))
            # Secret travels in the X-Cron-Secret HEADER (never in the URL).
            STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
              -X POST "$CRON_URL?$QS" \
              -H "X-Cron-Secret: $CRON_SECRET")

            # Parse the JSON body's `report` (the captured command stdout) and
            # print it line-by-line so it survives `gh run view --log`.
            REPORT="$(jq -r '.report // .detail // "(no report field in response)"' /tmp/cron-response.json 2>/dev/null || cat /tmp/cron-response.json)"
            echo "===== pass $PASS — HTTP $STATUS ====="
            printf '%s\n' "$REPORT"

            if [ "$STATUS" != "200" ]; then
              echo "::error::Cron endpoint returned $STATUS on pass $PASS — see report above."
              exit 1
            fi

            # Pull the machine-readable RESULT line counters (no copy phase for
            # ambassadors, so COPIED stays unset -> treated as 0).
            REMAINING="$(printf '%s\n' "$REPORT" | grep -oE 'remaining=[0-9]+' | tail -1 | cut -d= -f2 || true)"
            GEOCODED="$(printf '%s\n' "$REPORT" | grep -oE 'geocoded=[0-9]+' | tail -1 | cut -d= -f2 || true)"
            COPIED="$(printf '%s\n' "$REPORT" | grep -oE 'copied=[0-9]+' | tail -1 | cut -d= -f2 || true)"
            echo "pass $PASS summary: geocoded=${GEOCODED:-?} remaining=${REMAINING:-unknown}"

            # Dry-run is a single preview pass; never loops.
            [ "$EXECUTE" = "true" ] || break
            # Apply without auto_drain: a single batch (<=40 geocodes).
            [ "${AUTO_DRAIN:-true}" = "true" ] || break
            # Drained.
            if [ "${REMAINING:-0}" = "0" ]; then
              echo "Backlog drained (remaining=0) after $PASS pass(es)."
              break
            fi
            # No forward progress (e.g. an un-geocodable address tail) — stop
            # rather than spin.
            if [ "${GEOCODED:-0}" = "0" ] && [ "${COPIED:-0}" = "0" ]; then
              echo "::warning::No progress on pass $PASS (geocoded=0) but remaining=${REMAINING:-?} — likely un-geocodable addresses. Stopping; inspect those rows' addresses."
              break
            fi
            if [ "$PASS" -ge "$MAX_PASSES" ]; then
              echo "::warning::Hit MAX_PASSES=$MAX_PASSES with remaining=${REMAINING:-?} — re-run to continue draining."
              break
            fi
            sleep 2
          done
