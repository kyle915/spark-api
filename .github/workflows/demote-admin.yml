name: Demote admin (remove platform-admin flags)

# Manually fires `/internal/cron/demote-admin` on Cloud Run to clear is_staff +
# is_superuser for a user by email — this is what removes Django `/admin/`
# access. The in-app GraphQL admin grant for @igniteproductions.co is removed in
# CODE via utils.graphql.permissions.IGNITE_ADMIN_EXCLUDE; this endpoint handles
# only the DB-flag side.
#
# MANUAL one-off, NOT a recurring cron — only workflow_dispatch.
#
# SAFE — DRY-RUN IS THE DEFAULT. dry_run=true → apply=false → reports the user's
# current flags with NO change. Set dry_run=false to apply. Idempotent.
#
# Secret-gated via X-Cron-Secret (shared INTERNAL_CRON_SECRET), HEADER only.

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Email of the account to demote."
        required: true
        type: string
      dry_run:
        description: "Dry run (no change). Leave true to preview; set false to apply."
        required: true
        default: true
        type: boolean

jobs:
  fire-demote-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Fire demote-admin cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/demote-admin
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          EMAIL: ${{ github.event.inputs.email }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi
          if [ -z "$EMAIL" ]; then
            echo "::error::email input is required."
            exit 1
          fi

          if [ "$DRY_RUN" = "false" ]; then
            APPLY="true"
          else
            APPLY="false"
          fi
          echo "dry_run=$DRY_RUN -> apply=$APPLY (writes only when apply=true)"

          ENC_EMAIL=$(echo "$EMAIL" | sed 's/+/%2B/g')

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL?apply=$APPLY&email=$ENC_EMAIL" \
            -H "X-Cron-Secret: $CRON_SECRET")
          echo "HTTP $STATUS"

          echo "----- response body (demote report) -----"
          cat /tmp/cron-response.json
          echo
          echo "------------------------------------------"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Cron endpoint returned $STATUS — see body above."
            exit 1
          fi
