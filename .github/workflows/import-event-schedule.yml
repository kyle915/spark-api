name: Import event schedule (bulk client activations)

# Manually fires `/internal/cron/import-event-schedule` on Cloud Run to bulk-
# create a client's activation schedule (approved Requests + approved Events
# on the Master Tracker) from a committed JSON file — see
# events/management/commands/import_event_schedule.py. First use: Stone House
# Bread's Q2–Q3 2026 Kroger sampling schedule (74 events).
#
# MANUAL one-off, NOT a recurring cron — only `workflow_dispatch`. Run it from
# the Actions tab.
#
# SAFE — DRY-RUN IS THE DEFAULT. `dry_run` defaults to true → sends
# `execute=false`, so the import validates every row with NO event writes and
# the endpoint returns the report. To actually create the events, re-run with
# dry_run=false (→ execute=true). The reused importer dedups on store+start
# time, so a second real run won't double-create.
#
# Secret-gated via X-Cron-Secret (shared INTERNAL_CRON_SECRET), sent as a
# HEADER, never in the URL — same setup as the sibling backfill workflows.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no event writes). Leave true to preview; set false to create."
        required: true
        default: true
        type: boolean
      schedule:
        description: "Schedule key (data/<key>.json)."
        required: true
        default: "stone_house_q2q3_2026"
        type: string
      tenant_name:
        description: "Override tenant name (empty = use the schedule file's)."
        required: false
        default: ""
        type: string

jobs:
  fire-import-event-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Fire import-event-schedule cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/import-event-schedule
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          SCHEDULE: ${{ github.event.inputs.schedule }}
          TENANT_NAME: ${{ github.event.inputs.tenant_name || '' }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi

          # execute is the inverse of dry_run: dry_run=true -> execute=false
          # (preview, no writes); dry_run=false -> execute=true (create).
          if [ "$DRY_RUN" = "false" ]; then
            EXECUTE="true"
          else
            EXECUTE="false"
          fi
          echo "dry_run=$DRY_RUN -> execute=$EXECUTE (events created only when execute=true)"

          # URL-encode the schedule key (it's [a-z0-9_], so safe as-is) and
          # only add tenant_name when supplied.
          QS="execute=$EXECUTE&schedule=$SCHEDULE"
          if [ -n "$TENANT_NAME" ]; then
            # Spaces -> %20 so "Stone House Bread" survives the query string.
            ENC_TENANT=$(echo "$TENANT_NAME" | sed 's/ /%20/g')
            QS="$QS&tenant_name=$ENC_TENANT"
          fi

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL?$QS" \
            -H "X-Cron-Secret: $CRON_SECRET")
          echo "HTTP $STATUS"

          echo "----- response body (import report) -----"
          cat /tmp/cron-response.json
          echo
          echo "-----------------------------------------"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Cron endpoint returned $STATUS — see body above."
            exit 1
          fi
