name: Daily document-expiry reminders

# Fires `/internal/cron/send-document-expiry-reminders` on Cloud Run once a
# day. Pushes each BA a reminder for compliance docs expiring within 14 days
# (see documents/management/commands/send_document_expiry_reminders.py).
# Secret-gated via X-Cron-Secret (shared INTERNAL_CRON_SECRET) — same setup
# as the daily-new-gig-digest workflow.
#
# Schedule: 17:00 UTC = 10:00 PT (DST) / 09:00 PST — late morning.

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Look-ahead window in days"
        required: false
        default: "14"
      dry_run:
        description: "Compute + log, but send no pushes"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  fire-document-expiry-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Fire document-expiry reminders cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/send-document-expiry-reminders
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DAYS: ${{ github.event.inputs.days || '14' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi
          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL?days=$DAYS&dry_run=$DRY_RUN" \
            -H "X-Cron-Secret: $CRON_SECRET")
          echo "HTTP $STATUS"
          cat /tmp/cron-response.json
          if [ "$STATUS" != "200" ]; then
            echo "::error::Cron endpoint returned $STATUS — see body above."
            exit 1
          fi
