name: Ambassador job reminders

# Fires `/internal/cron/ambassador-job-reminders` on Cloud Run every ~10 min.
# Sends the four per-shift BA reminders — 24h before, 3h before, 15 min before
# start, and 15 min after end — once each, deduped via the
# AmbassadorJob.reminder_*_sent_at columns. See
# jobs/management/commands/send_ambassador_job_reminders.py.
#
# Replaces the dead django-rq scheduled reminders (there is no Redis /
# rqscheduler in prod, so scheduler.schedule(...) silently dropped every one).
# The push is sent INLINE in the web process — no worker needed.
#
# First-run safety: the three "before" reminders only select FUTURE shifts, and
# the "after-end" one is bounded to shifts that ended within end_lookback_minutes
# — so a first run can't blast historical shifts whose columns are still NULL.
#
# Secret-gated via `X-Cron-Secret` (shared INTERNAL_CRON_SECRET on both the
# Cloud Run env and the repo secret).
#
# Schedule: every 10 minutes. The 15-min "before" window is wider than the
# cadence on purpose so no shift slips between two runs; the dedup stamps keep
# each reminder to a single send.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report per-reminder counts, but send nothing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      end_lookback_minutes:
        description: "After-end reminder only for shifts ended within N minutes"
        required: false
        default: "120"

jobs:
  fire-ambassador-job-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Fire ambassador-job-reminders cron endpoint
        env:
          CRON_URL: https://spark-api-new-490085168610.us-central1.run.app/internal/cron/ambassador-job-reminders
          CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          END_LOOKBACK: ${{ github.event.inputs.end_lookback_minutes || '120' }}
        run: |
          set -euo pipefail

          if [ -z "$CRON_SECRET" ]; then
            echo "::error::INTERNAL_CRON_SECRET is not set in repo secrets."
            exit 1
          fi

          STATUS=$(curl -sS -o /tmp/cron-response.json -w '%{http_code}' \
            -X POST "$CRON_URL?dry_run=$DRY_RUN&end_lookback_minutes=$END_LOOKBACK" \
            -H "X-Cron-Secret: $CRON_SECRET")

          echo "HTTP $STATUS"
          cat /tmp/cron-response.json
          if [ "$STATUS" != "200" ]; then
            echo "::error::Cron endpoint returned $STATUS — see body above."
            exit 1
          fi
