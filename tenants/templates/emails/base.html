<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Spark</title>
    <style type="text/css">
      @media only screen and (max-width: 600px) {
        .email-shell {
          width: 100% !important;
        }

        .email-header,
        .email-content,
        .email-footer {
          padding-left: 20px !important;
          padding-right: 20px !important;
        }

        .store-badge-cell {
          display: block !important;
          width: 100% !important;
          padding: 0 0 12px 0 !important;
        }

        .store-badge-image {
          width: 180px !important;
          max-width: 100% !important;
        }
      }
    </style>
    <!--[if mso]>
    <style type="text/css">
      body, table, td {font-family: Arial, sans-serif !important;}
    </style>
    <![endif]-->
  </head>
  <body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f4f4f4;">
      <tr>
        <td align="center" style="padding: 20px;">
          <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" class="email-shell" style="background-color: #ffffff; border-radius: 8px; max-width: 600px; width: 100%;">
            <!-- Header -->
            <tr>
              <td align="center" class="email-header" style="padding: 40px 40px 20px 40px;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                  <tr>
                    <td align="center">
                      {% if EMAIL_LOGO_CID %}
                        <img
                          src="cid:{{ EMAIL_LOGO_CID }}"
                          alt="Spark"
                          width="180"
                          style="display: block; margin: 0 auto; height: auto; border: 0; outline: none; text-decoration: none;"
                        />
                      {% elif EMAIL_LOGO_URL %}
                        <img
                          src="{{ EMAIL_LOGO_URL }}"
                          alt="Spark"
                          width="180"
                          style="display: block; margin: 0 auto; height: auto; border: 0; outline: none; text-decoration: none;"
                        />
                      {% else %}
                        <span style="font-size: 32px; font-weight: bold; color: #4a90e2;">Spark</span>
                      {% endif %}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <!-- Content -->
            <tr>
              <td class="email-content" style="padding: 0 40px 30px 40px;">
                {% block content %} {% endblock %}
              </td>
            </tr>
            <!-- Footer -->
            <tr>
              <td class="email-footer" style="padding: 20px 40px 40px 40px; border-top: 1px solid #eeeeee;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                  <tr>
                    <td align="center" style="font-size: 14px; color: #888888; line-height: 1.6;">
                      <p style="margin: 0; font-size: 12px; color: #aaaaaa;">
                        This is an automated message. Please do not reply to this email.
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
